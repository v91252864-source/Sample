<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forever Living Family Registration</title>

<style>

body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #43cea2, #185a9d);
    font-family: "Segoe UI", sans-serif;
}

/* Form Box */
.register-form {
    width: 400px;
    margin: 40px auto;
    background: #ffffff;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
}

.logo {
    text-align: center;
    margin-bottom: 10px;
}

.logo img {
    width: 100px;
}

h1 {
    text-align: center;
    color: #185a9d;
    margin-bottom: 5px;
}

.tagline {
    text-align: center;
    font-size: 14px;
    color: #555;
    margin-bottom: 20px;
}

.field {
    margin-bottom: 12px;
}

.field label {
    font-size: 14px;
    color: #333;
}

.field input, .field textarea {
    width: 100%;
    padding: 8px;
    margin-top: 4px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

button {
    width: 100%;
    padding: 10px;
    background: #43cea2;
    border: none;
    border-radius: 6px;
    color: white;
    font-size: 16px;
    cursor: pointer;
}

button:hover {
    background: #2bbf91;
}

/* Success Message */
#successBox {
    display: none;
    width: 400px;
    margin: 20px auto;
    background: #ffffff;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.3);
}

#successBox h2 {
    color: green;
    text-align: center;
}

.data-box {
    font-size: 14px;
    margin-top: 10px;
}

</style>
</head>

<body>

<form class="register-form" id="regForm">

    <div class="logo">
        <!-- Official Forever Living Logo -->
        <img src="https://upload.wikimedia.org/wikipedia/en/5/5c/Forever_Living_Products_logo.png">
    </div>

    <h1>Welcome to Forever Living Family 🌿</h1>
    <p class="tagline">
        Join Now to Earning – Zero to Hero Success Your Dream 🚀
    </p>

    <div class="field">
        <label>Full Name</label>
        <input type="text" id="name" required>
    </div>

    <div class="field">
        <label>Email</label>
        <input type="email" id="email" required>
    </div>

    <div class="field">
        <label>Mobile Number</label>
        <input type="tel" id="phone" required>
    </div>

    <div class="field">
        <label>Date of Birth</label>
        <input type="date" id="dob" required>
    </div>

    <div class="field">
        <label>City</label>
        <input type="text" id="city" required>
    </div>

    <div class="field">
        <label>Address</label>
        <textarea id="address" rows="2" required></textarea>
    </div>

    <div class="field">
        <label>Password</label>
        <input type="password" id="password" required>
    </div>

    <button type="submit">Join Now 🚀</button>

</form>

<!-- Success Box -->
<div id="successBox">
    <h2>Registration Successful 🎉</h2>
    <div class="data-box" id="userData"></div>
</div>

<script>

document.getElementById("regForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const phone = document.getElementById("phone").value;
    const dob = document.getElementById("dob").value;
    const city = document.getElementById("city").value;
    const address = document.getElementById("address").value;

    document.getElementById("regForm").style.display = "none";

    document.getElementById("successBox").style.display = "block";
    document.getElementById("userData").innerHTML = `
        <strong>Name:</strong> ${name} <br>
        <strong>Email:</strong> ${email} <br>
        <strong>Mobile:</strong> ${phone} <br>
        <strong>DOB:</strong> ${dob} <br>
        <strong>City:</strong> ${city} <br>
        <strong>Address:</strong> ${address}
    `;
});

</script>

</body>
</html>

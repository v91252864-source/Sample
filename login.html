<!DOCTYPE html>
<html lang="en">
<head>
  <style>

body {
    margin: 0;
    padding: 0;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
    overflow: hidden;
}

.register-form {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(255,255,255,0.95);
    padding: 2rem 3rem;
    border-radius: 8px;
    box-shadow: 0 8px 20px rgba(0,0,0,.2);
    width: 320px;
}

.register-form h1 {
    margin: 0 0 1rem;
    text-align: center;
    color: #333;
}

.register-form .field {
    margin-bottom: 1rem;
}

.register-form .field label {
    display: block;
    margin-bottom: .3rem;
    color: #555;
}

.register-form .field input {
    width: 100%;
    padding: .5rem;
    border: 1px solid #ccc;
    border-radius: 4px;
    font-size: 1rem;
}

.register-form button {
    width: 100%;
    padding: .75rem;
    border: none;
    border-radius: 4px;
    background: #ff6b6b;
    color: #fff;
    font-size: 1rem;
    cursor: pointer;
    transition: background .3s;
}

.register-form button:hover {
    background: #ff4757;
}

.spark-wrapper {
    position: absolute;
    width: 100%;
    height: 100%;
    top: 0;
    left: 0;
    pointer-events: none;
    overflow: hidden;
}

.spark {
    position: absolute;
    width: 4px;
    height: 4px;
    background: #fff;
    border-radius: 50%;
    box-shadow: 0 0 8px 2px #fff;
    animation: sparkle 5s linear infinite;
}

@keyframes sparkle {
    0%   { transform: translate(var(--x0), var(--y0)) scale(0); }
    50%  { transform: translate(var(--x1), var(--y1)) scale(1); }
    100% { transform: translate(var(--x2), var(--y2)) scale(0); }
}

/* …existing code… */

<body>
    <!-- spark container – script will populate it with little glowing dots -->
    <div class="spark-wrapper"></div>

    <form class="register-form" action="#" method="post">
        <h1>Create account</h1>
        <div class="field">
            <label for="name">Name</label>
            <input id="name" name="name" required>
        </div>
        <div class="field">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
        </div>
        <div class="field">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
        </div>
        <button type="submit">Register</button>
    </form>

    <script src="js/main.js"></script>
</body>
</html>

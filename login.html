<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Login — Sample</title>
    <link rel="stylesheet" href="assets/style.css">
  </head>
  <body>
    <main class="center">
      <form id="loginForm" class="card" action="#" method="post" novalidate>
        <marquee class="logo" behavior="alternate" scrollamount="5" 
        style="background-color: red;">Vedant Deshmukh</marquee>
        <h1 class="title">Sign in</h1>

        <label for="email">Email</label>
        <input id="email" name="email" type="email" placeholder="you@example.com" required>

        <label for="password">Password</label>
        <div class="pw-row">
          <input id="password" name="password" type="password" placeholder="••••••••" required minlength="6">
          <button type="button" id="togglePw" aria-label="Show password">Show</button>
        </div>

        <label class="checkbox"><input type="checkbox" name="remember"> Remember me</label>

        <button class="primary" type="submit">Sign in</button>

        <p class="muted">Don't have an account? <a href="#">Create one</a></p>
      </form>
    </main>

    <script src="assets/script.js"></script>
  </body>
</html>
